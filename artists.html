<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artists | STAND UP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep:#080c1a; --bg-mid:#0d1530; --bg-card:#111d3a; --bg-card2:#0f1a32;
  --navy:#1a2d5a; --blue:#4a80e8; --blue-bright:#7aaeff;
  --white:#eef2ff; --white-dim:rgba(238,242,255,0.65); --white-faint:rgba(238,242,255,0.25);
  --border:rgba(74,128,232,0.2); --border-glow:rgba(122,174,255,0.4);
  --sans: 'Noto Sans KR', sans-serif; --serif: 'Noto Serif KR', serif;
}
html { scroll-behavior: smooth; }
body { background:var(--bg-deep); color:var(--white); font-family:var(--sans); overflow-x:hidden; min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(168,200,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 70%,rgba(168,200,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 15%,rgba(168,200,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 55%,rgba(168,200,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 85%,rgba(168,200,255,.3) 0%,transparent 100%);
  pointer-events:none; z-index:0;
}

/* NAV */
nav { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; justify-content:space-between; align-items:center; padding:22px 48px; background:linear-gradient(to bottom,rgba(8,12,26,.97),transparent); }
.nav-logo { font-family: 'Noto Serif KR', serif; letter-spacing: -0.01em;  font-family:var(--serif); font-size:15px; letter-spacing:.25em; color:var(--blue-bright); text-decoration:none; text-shadow:0 0 12px rgba(122,174,255,.4); }
.nav-back { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:500; letter-spacing:.1em; color:var(--white-dim); text-decoration:none; border:1px solid var(--border-glow); border-radius:4px; padding:7px 16px; transition:all .2s; }
.nav-back:hover { color:var(--blue-bright); background:rgba(122,174,255,.08); }

/* PAGE HERO */
.page-hero { position:relative; z-index:1; padding:140px 60px 60px; text-align:center; }
.page-eyebrow { font-size:10px; letter-spacing:.35em; color:var(--blue); font-weight:700; text-transform:uppercase; margin-bottom:16px; }
.page-title { font-family: 'Noto Serif KR', serif; letter-spacing: -0.01em;  font-family:var(--serif); font-size:clamp(36px,5vw,64px); font-weight:900; color:var(--white); margin-bottom:16px; line-height:1.1; }
.page-title .accent { color:var(--blue-bright); }
.page-desc { font-size:15px; color:var(--white-dim); font-weight:300; line-height:1.8; max-width:480px; margin:0 auto 40px; }

/* FILTER */




/* GRID */
.artists-section { position:relative; z-index:1; padding:0 60px 120px; }
.artists-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; max-width:1200px; margin:0 auto; }

/* CARD */
.artist-card { background:var(--bg-card); border:1px solid var(--border); border-radius:18px; overflow:hidden; transition:all .3s; cursor:pointer; position:relative; }
.artist-card:hover { border-color:var(--border-glow); transform:translateY(-6px); box-shadow:0 12px 40px rgba(74,128,232,.18); }
.artist-card.active { border-color:var(--blue-bright); box-shadow:0 0 0 2px rgba(122,174,255,.3),0 12px 40px rgba(74,128,232,.2); transform:translateY(-6px); }
.artist-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--blue-bright),transparent); opacity:0; transition:opacity .3s; }
.artist-card:hover::before, .artist-card.active::before { opacity:1; }
.artist-img-wrap { position:relative; aspect-ratio:1; overflow:hidden; }
.artist-img-placeholder { width:100%; height:100%; background:linear-gradient(135deg,var(--bg-deep) 0%,var(--navy) 100%); display:flex; align-items:center; justify-content:center; font-size:52px; opacity:.45; }
.artist-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
.artist-card:hover .artist-img-wrap img, .artist-card.active .artist-img-wrap img { transform:scale(1.05); }
.artist-badge { position:absolute; top:10px; left:10px; background:rgba(10,20,50,.85); backdrop-filter:blur(8px); border:1px solid var(--border-glow); border-radius:6px; padding:4px 10px; font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--blue-bright); }
.artist-info { padding:18px 16px; }
.artist-name { font-size:15px; font-weight:700; color:var(--white); margin-bottom:5px; }
.artist-desc { font-size:11px; color:var(--white-dim); line-height:1.7; margin-bottom:10px; font-weight:300; display:-webkit-box; line-clamp:2; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.artist-tags { display:flex; gap:5px; flex-wrap:wrap; }
.tag { background:rgba(74,128,232,.1); border:1px solid var(--border); border-radius:100px; padding:2px 9px; font-size:10px; color:var(--blue-bright); font-weight:500; }
.artist-card.recruiting { border-style:dashed; border-color:rgba(74,128,232,.3); cursor:default; }
.recruit-text { padding:20px 16px; text-align:center; }
.recruit-icon { font-size:28px; margin-bottom:10px; display:block; opacity:.4; }
.recruit-title { font-size:13px; font-weight:700; color:var(--blue-bright); margin-bottom:6px; }
.recruit-sub { font-size:11px; color:var(--white-dim); line-height:1.6; font-weight:300; }

/* DETAIL PANEL */
.detail-backdrop { position:fixed; inset:0; background:rgba(8,12,26,.75); backdrop-filter:blur(8px); z-index:300; opacity:0; pointer-events:none; transition:opacity .35s; }
.detail-backdrop.open { opacity:1; pointer-events:all; }

.detail-panel { position:fixed; bottom:0; left:0; right:0; z-index:400; height:86vh; background:var(--bg-mid); border-top:1px solid var(--border-glow); border-radius:24px 24px 0 0; display:grid; grid-template-columns:400px 1fr; overflow:hidden; transform:translateY(100%); transition:transform .45s cubic-bezier(.32,.72,0,1); }
.detail-panel.open { transform:translateY(0); }

/* 패널 왼쪽 */
.panel-left { position:relative; overflow:hidden; background:linear-gradient(160deg,var(--bg-deep) 0%,#0a1428 100%); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:0 24px 40px; }
.panel-left-glow { position:absolute; bottom:-60px; left:50%; transform:translateX(-50%); width:320px; height:320px; background:radial-gradient(circle,rgba(74,128,232,.15) 0%,transparent 70%); pointer-events:none; }
.panel-character { width:100%; max-height:72%; object-fit:contain; object-position:bottom; position:relative; z-index:1; }
.panel-char-icon { font-size:110px; opacity:.2; position:relative; z-index:1; margin-bottom:20px; line-height:1; }
.panel-left-name { position:relative; z-index:1; font-family:var(--serif); font-size:22px; font-weight:900; color:var(--white); letter-spacing:.1em; margin-bottom:8px; text-align:center; }
.panel-left-badge { position:relative; z-index:1; background:rgba(74,128,232,.2); border:1px solid var(--border-glow); border-radius:100px; padding:5px 16px; font-size:11px; color:var(--blue-bright); font-weight:600; }

/* 패널 오른쪽 */
.panel-right { overflow-y:auto; padding:52px 48px 52px 44px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.panel-right::-webkit-scrollbar { width:4px; }
.panel-right::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.panel-close { position:absolute; top:20px; right:24px; z-index:500; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--white-dim); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; font-family:var(--sans); }
.panel-close:hover { background:rgba(122,174,255,.1); color:var(--blue-bright); border-color:var(--border-glow); }
.panel-eyebrow { font-size:10px; letter-spacing:.3em; color:var(--blue); font-weight:700; text-transform:uppercase; margin-bottom:10px; }
.panel-name { font-family: 'Noto Serif KR', serif; letter-spacing: -0.01em;  font-family:var(--serif); font-size:38px; font-weight:900; color:var(--white); margin-bottom:14px; line-height:1.1; }
.panel-tags { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:28px; }
.panel-tag { background:rgba(74,128,232,.12); border:1px solid var(--border-glow); border-radius:100px; padding:4px 13px; font-size:11px; color:var(--blue-bright); font-weight:500; }
.panel-section-label { font-size:10px; letter-spacing:.25em; color:var(--blue); font-weight:700; text-transform:uppercase; margin-bottom:12px; }
.panel-bio { font-size:14px; line-height:2; color:var(--white-dim); font-weight:300; margin-bottom:24px; }
.panel-sns { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:36px; }
.panel-sns-btn { display:flex; align-items:center; gap:7px; padding:9px 18px; border:1px solid var(--border); border-radius:8px; font-size:12px; font-weight:500; color:var(--white-dim); text-decoration:none; font-family:var(--sans); transition:all .2s; background:transparent; }
.panel-sns-btn:hover { border-color:var(--blue-bright); color:var(--blue-bright); background:rgba(122,174,255,.08); }
.panel-divider { height:1px; background:var(--border); margin:0 0 28px; }
.works-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.work-item { aspect-ratio:1; border-radius:10px; overflow:hidden; background:var(--bg-card); border:1px solid var(--border); cursor:pointer; transition:all .25s; position:relative; }
.work-item:hover { border-color:var(--border-glow); transform:scale(1.04); }
.work-item img { width:100%; height:100%; object-fit:cover; }
.work-placeholder { width:100%; height:100%; background:linear-gradient(135deg,var(--bg-deep),var(--navy)); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.work-placeholder .wi { font-size:34px; opacity:.35; }
.work-placeholder .wl { font-size:9px; color:var(--white-dim); opacity:.5; font-family:var(--sans); letter-spacing:.1em; }

/* FOOTER */
footer { position:relative; z-index:1; background:var(--bg-mid); border-top:1px solid var(--border); padding:32px 60px; display:flex; justify-content:space-between; align-items:center; }
.footer-logo { font-family:var(--serif); font-size:16px; letter-spacing:.2em; color:var(--blue-bright); }
.footer-copy { font-size:11px; color:var(--white-faint); }

/* ADMIN MODE */
.admin-page { display:none; position:relative; z-index:1; padding:120px 60px 60px; }
body.admin-mode .admin-page { display:block; }
body.admin-mode .page-hero,
body.admin-mode .artists-section,
body.admin-mode footer,
body.admin-mode .detail-backdrop,
body.admin-mode .detail-panel { display:none; }
.admin-wrap { max-width:1100px; margin:0 auto; }
.admin-title { font-family:var(--serif); font-size:34px; margin-bottom:8px; }
.admin-sub { color:var(--white-dim); margin-bottom:16px; }
.admin-toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
.admin-layout { display:grid; grid-template-columns:320px 1fr; gap:14px; }
.admin-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:12px; }
.admin-list { display:flex; flex-direction:column; gap:8px; max-height:70vh; overflow-y:auto; }
.admin-item { border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; background:var(--bg-card2); }
.admin-item.active { border-color:var(--border-glow); }
.admin-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.admin-full { grid-column:1 / -1; }
.admin-label { font-size:12px; color:var(--white-dim); margin-bottom:4px; display:block; }
.admin-input, .admin-textarea { width:100%; background:var(--bg-deep); border:1px solid var(--border); border-radius:10px; color:var(--white); padding:10px 12px; font-family:var(--sans); }
.admin-textarea { min-height:100px; resize:vertical; }
.admin-toolbar .nav-back,
.admin-toolbar button.nav-back {
  background: transparent;
  color: var(--white-dim);
  border: 1px solid var(--border-glow);
  border-radius: 999px;
  padding: 8px 14px;
  font-family: var(--sans);
  cursor: pointer;
}
.admin-toolbar .nav-back:hover,
.admin-toolbar button.nav-back:hover {
  color: var(--blue-bright);
  background: rgba(122,174,255,.08);
}
.admin-upload-wrap { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.admin-preview {
  width: 90px;
  height: 90px;
  border: 1px solid var(--border);
  border-radius: 10px;
  object-fit: cover;
  background: var(--bg-card2);
}

/* RESPONSIVE */
@media (max-width:1100px) { .artists-grid { grid-template-columns:repeat(3,1fr); } }
@media (max-width:900px) {
  nav { padding:16px 20px; }
  .admin-page { padding:100px 20px 40px; }
  .admin-layout { grid-template-columns:1fr; }
  .page-hero { padding:110px 20px 48px; }
  .artists-section { padding:0 20px 80px; }
  .artists-grid { grid-template-columns:repeat(2,1fr); gap:14px; }
  .detail-panel { grid-template-columns:1fr; grid-template-rows:38% 1fr; height:92vh; }
  .panel-left { border-right:none; border-bottom:1px solid var(--border); padding:16px 24px 20px; flex-direction:row; justify-content:center; gap:20px; align-items:center; }
  .panel-char-icon { font-size:60px; margin-bottom:0; }
  .panel-left-name { font-size:18px; }
  .panel-right { padding:24px 20px; }
  .panel-name { font-family: 'Noto Serif KR', serif; letter-spacing: -0.01em;  font-size:26px; }
  footer { flex-direction:column; gap:12px; text-align:center; padding:24px 20px; }
}
@media (max-width:480px) {
  .artists-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
  .works-grid { grid-template-columns:repeat(2,1fr); }
  
  .panel-sns { gap:7px; }
}
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">STAND UP</a>
  <a href="index.html" class="nav-back">← 홈으로</a>
</nav>

<section class="admin-page" id="adminPage">
  <div class="admin-wrap">
    <h1 class="admin-title">작가 관리 페이지</h1>
    <p class="admin-sub">`?admin` 전용 화면입니다. 저장하면 고객 화면에 즉시 반영됩니다.</p>
    <div class="admin-toolbar">
      <a href="artists.html" class="nav-back">고객 화면 보기</a>
      <button class="nav-back" type="button" onclick="adminAddArtist()">새 작가 추가</button>
      <button class="nav-back" type="button" onclick="adminSaveArtist()">저장</button>
      <button class="nav-back" type="button" onclick="adminDeleteArtist()">선택 삭제</button>
    </div>
    <div class="admin-layout">
      <div class="admin-panel"><div id="adminList" class="admin-list"></div></div>
      <div class="admin-panel">
        <div class="admin-form-grid">
          <div><label class="admin-label">작가명</label><input class="admin-input" id="aName"></div>
          <div><label class="admin-label">배지</label><input class="admin-input" id="aBadge"></div>
          <div><label class="admin-label">아이콘</label><input class="admin-input" id="aIcon"></div>
          <div><label class="admin-label">카드 소개</label><input class="admin-input" id="aCardDesc"></div>
          <div class="admin-full">
            <label class="admin-label">프로필 이미지 URL</label>
            <input class="admin-input" id="aCharacterImg" placeholder="https://...">
          </div>
          <div class="admin-full">
            <label class="admin-label">프로필 이미지 파일 업로드</label>
            <div class="admin-upload-wrap">
              <input class="admin-input" id="aCharacterFile" type="file" accept="image/*" onchange="adminUploadCharacterImage(event)" style="max-width:320px;">
              <img id="aCharacterPreview" class="admin-preview" alt="프로필 미리보기">
            </div>
          </div>
          <div class="admin-full"><label class="admin-label">태그 (쉼표 구분)</label><input class="admin-input" id="aTags"></div>
          <div class="admin-full"><label class="admin-label">상세 소개</label><textarea class="admin-textarea" id="aBio"></textarea></div>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="page-hero">
  <div class="page-eyebrow">STAND UP ARTISTS</div>
  <h1 class="page-title">함께하는<br>작가님들<span class="accent">.</span></h1>
  <p class="page-desc">STAND UP과 함께 팬들을 만나고 있는 작가님들을 소개합니다.</p>
  </div>

<section class="artists-section">
  <div class="artists-grid" id="artistsGrid"></div>
</section>

<footer>
  <div class="footer-logo">STAND UP</div>
  <div class="footer-copy">© 2025 STAND UP. All rights reserved.</div>
</footer>

<!-- BACKDROP -->
<div class="detail-backdrop" id="backdrop" onclick="closePanel()"></div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="panel-close" onclick="closePanel()">✕</button>

  <!-- 왼쪽: 대표 캐릭터 -->
  <div class="panel-left" id="panelLeft">
    <div class="panel-left-glow"></div>
    <div class="panel-char-icon" id="panelCharIcon"></div>
    <div style="position:relative;z-index:1;text-align:center;">
      <div class="panel-left-name" id="panelLeftName"></div>
      <div class="panel-left-badge" id="panelLeftBadge"></div>
    </div>
  </div>

  <!-- 오른쪽: 소개 + 작품 -->
  <div class="panel-right" id="panelRight">
    <div class="panel-eyebrow">ARTIST PROFILE</div>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-tags" id="panelTags"></div>
    <div class="panel-section-label">ABOUT</div>
    <div class="panel-bio" id="panelBio"></div>
    <div class="panel-sns" id="panelSns"></div>
    <div class="panel-divider"></div>
    <div class="panel-section-label">대표 작품</div>
    <div class="works-grid" id="worksGrid"></div>
  </div>
</div>

<script type="module">
import { firebaseApp, firebaseReady, artistsDocPath } from './firebase-config.js';
import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

let artists = [];
let selectedAdminIdx = -1;
const isAdmin = new URLSearchParams(location.search).has('admin');

function getCardDesc(artist) {
  if (artist.cardDesc && artist.cardDesc.trim()) return artist.cardDesc.trim();
  return (artist.bio || '').split('\n')[0] || '작가 소개 문구입니다.';
}

function renderArtists() {
  const grid = document.getElementById('artistsGrid');
  const cards = artists.map((artist, idx) => {
    const cardDesc = getCardDesc(artist);
    const tags = (artist.tags || []).slice(0, 2).map(tag => `<span class="tag">${tag}</span>`).join('');
    const genre = (artist.tags || []).join(' ');

    const cover = artist.characterImg
      ? `<img src="${artist.characterImg}" alt="${artist.name || '작가'}">`
      : `<div class="artist-img-placeholder">${artist.icon || '🎨'}</div>`;
    return `<div class="artist-card" data-idx="${idx}" data-genre="${genre}" onclick="openPanel(${idx})">
      <div class="artist-img-wrap">${cover}<div class="artist-badge">${artist.badge || '작가'}</div></div>
      <div class="artist-info"><div class="artist-name">${artist.name || '작가명'}</div><div class="artist-desc">${cardDesc}</div><div class="artist-tags">${tags}</div></div>
    </div>`;
  }).join('');

  const recruit = `<div class="artist-card recruiting" data-genre="all">
      <div class="artist-img-wrap"><div class="artist-img-placeholder">✦</div></div>
      <div class="recruit-text"><span class="recruit-icon">✦</span><div class="recruit-title">작가 모집 중</div><div class="recruit-sub">함께하고 싶은 작가님,<br>언제든 문의해주세요!</div></div>
    </div>`;

  grid.innerHTML = cards + recruit;
}

function openPanel(idx) {
  const artist = artists[idx];
  if (!artist) return;
  document.querySelectorAll('.artist-card[data-idx]').forEach(c => c.classList.remove('active'));
  document.querySelector(`.artist-card[data-idx="${idx}"]`).classList.add('active');

  const a = artist;

  // 왼쪽
  const ci = document.getElementById('panelCharIcon');
  if (a.characterImg) {
    ci.innerHTML = `<img class="panel-character" src="${a.characterImg}" alt="${a.name}">`;
    ci.className = '';
    ci.style.fontSize = '';
  } else {
    ci.textContent = a.icon;
    ci.className = 'panel-char-icon';
  }
  document.getElementById('panelLeftName').textContent = a.name;
  document.getElementById('panelLeftBadge').textContent = a.badge;

  // 오른쪽
  document.getElementById('panelName').textContent = a.name;
  document.getElementById('panelTags').innerHTML = a.tags.map(t=>`<span class="panel-tag">${t}</span>`).join('');
  document.getElementById('panelBio').innerHTML = a.bio.replace(/\n/g,'<br>');
  document.getElementById('panelSns').innerHTML = a.sns.map(s=>`<a href="${s.url}" class="panel-sns-btn" target="_blank">${s.label}</a>`).join('');
  document.getElementById('worksGrid').innerHTML = a.works.map((w,i)=>
    w ? `<div class="work-item"><img src="${w}" alt="작품${i+1}"></div>`
      : `<div class="work-item"><div class="work-placeholder"><span class="wi">${a.workIcons[i]||'🖼'}</span><span class="wl">작품 ${i+1}</span></div></div>`
  ).join('');

  document.getElementById('backdrop').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('panelRight').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.artist-card').forEach(c => c.classList.remove('active'));
  document.body.style.overflow = '';
}



function renderAdminList() {
  const list = document.getElementById('adminList');
  if (!list) return;
  list.innerHTML = artists.map((a, idx) => `
    <div class="admin-item ${idx === selectedAdminIdx ? 'active' : ''}" onclick="adminSelectArtist(${idx})">
      <div>${a.icon || '🎨'} ${a.name || '작가명'}</div>
      <div style="font-size:12px;color:var(--white-dim);">${a.badge || ''}</div>
    </div>
  `).join('');
}

function adminSelectArtist(idx) {
  selectedAdminIdx = idx;
  const a = artists[idx];
  if (!a) return;
  document.getElementById('aName').value = a.name || '';
  document.getElementById('aBadge').value = a.badge || '';
  document.getElementById('aIcon').value = a.icon || '';
  document.getElementById('aCardDesc').value = a.cardDesc || '';
  document.getElementById('aCharacterImg').value = a.characterImg || '';
  const preview = document.getElementById('aCharacterPreview');
  preview.src = a.characterImg || '';
  preview.style.display = a.characterImg ? '' : 'none';
  document.getElementById('aTags').value = (a.tags || []).join(', ');
  document.getElementById('aBio').value = a.bio || '';
  renderAdminList();
}

function adminUploadCharacterImage(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target && e.target.result ? String(e.target.result) : '';
    if (!dataUrl) return;
    document.getElementById('aCharacterImg').value = dataUrl;
    const preview = document.getElementById('aCharacterPreview');
    preview.src = dataUrl;
    preview.style.display = '';
  };
  reader.readAsDataURL(file);
}

function adminAddArtist() {
  artists.push({
    name: '새 작가',
    badge: '일러스트',
    icon: '🎨',
    cardDesc: '작가 소개를 입력해주세요.',
    tags: ['신규'],
    bio: '상세 소개를 입력해주세요.',
    sns: [{ label: '𝕏 Twitter', url: '#' }],
    characterImg: null,
    works: [null, null, null, null, null, null],
    workIcons: ['🖼', '✨', '🌟', '🎨', '💫', '🌙'],
  });
  adminSelectArtist(artists.length - 1);
  renderArtists();
}

async function adminSaveArtist() {
  if (selectedAdminIdx < 0 || !artists[selectedAdminIdx]) return;
  const t = artists[selectedAdminIdx];
  t.name = document.getElementById('aName').value.trim() || '작가명';
  t.badge = document.getElementById('aBadge').value.trim() || '작가';
  t.icon = document.getElementById('aIcon').value.trim() || '🎨';
  t.cardDesc = document.getElementById('aCardDesc').value.trim() || '작가 소개 문구입니다.';
  t.characterImg = document.getElementById('aCharacterImg').value.trim() || null;
  t.tags = document.getElementById('aTags').value.split(',').map(v => v.trim()).filter(Boolean);
  t.bio = document.getElementById('aBio').value.trim() || '';
  if (!Array.isArray(t.sns)) t.sns = [{ label: '𝕏 Twitter', url: '#' }];
  if (!Array.isArray(t.works)) t.works = [null, null, null, null, null, null];
  if (!Array.isArray(t.workIcons)) t.workIcons = ['🖼', '✨', '🌟', '🎨', '💫', '🌙'];
  await setDoc(doc(getFirestore(firebaseApp), artistsDocPath.collection, artistsDocPath.document), { items: artists }, { merge: true });
  renderArtists();
  renderAdminList();
  alert('저장 완료');
}

async function adminDeleteArtist() {
  if (selectedAdminIdx < 0 || !artists[selectedAdminIdx]) return;
  if (!confirm('선택한 작가를 삭제할까요?')) return;
  artists.splice(selectedAdminIdx, 1);
  selectedAdminIdx = -1;
  await setDoc(doc(getFirestore(firebaseApp), artistsDocPath.collection, artistsDocPath.document), { items: artists }, { merge: true });
  renderArtists();
  renderAdminList();
}

// module 스코프 함수들을 inline onclick에서 접근 가능하게 연결
window.openPanel = openPanel;
window.closePanel = closePanel;
window.adminSelectArtist = adminSelectArtist;
window.adminAddArtist = adminAddArtist;
window.adminSaveArtist = adminSaveArtist;
window.adminDeleteArtist = adminDeleteArtist;
window.adminUploadCharacterImage = adminUploadCharacterImage;

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function loadJsonFallback() {
  try {
    const response = await fetch('artists-data.json', { cache: 'no-store' });
    if (!response.ok) throw new Error('failed to fetch artists-data.json');
    const data = await response.json();
    artists = Array.isArray(data) ? data : [];
  } catch (e) {
    artists = [];
  }
  renderArtists();
  if (isAdmin) {
    renderAdminList();
    if (selectedAdminIdx < 0 && artists.length) adminSelectArtist(0);
  }
}

async function boot() {
  if (isAdmin) document.body.classList.add('admin-mode');
  if (!firebaseReady || !firebaseApp) {
    await loadJsonFallback();
    return;
  }

  try {
    const db = getFirestore(firebaseApp);
    const artistsRef = doc(db, artistsDocPath.collection, artistsDocPath.document);

    onSnapshot(
      artistsRef,
      async (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.data();
          artists = Array.isArray(data.items) ? data.items : [];
          renderArtists();
          if (isAdmin) {
            renderAdminList();
            if (selectedAdminIdx < 0 && artists.length) adminSelectArtist(0);
          }
          return;
        }
        await loadJsonFallback();
      },
      async () => {
        await loadJsonFallback();
      }
    );
  } catch (e) {
    await loadJsonFallback();
  }
}

boot();
</script>
</body>
</html>
