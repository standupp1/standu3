<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAND UP | 모든 작가</title>
    <!-- Fonts -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables */
        :root {
            --bg-color: #050508;
            --text-main: #f0f0f5;
            --text-muted: #888899;
            --accent-1: #00f2fe;
            --accent-2: #4facfe;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Pretendard', sans-serif;
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }
        
        /* Background Animations */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,242,254,0.1) 0%, rgba(5,5,8,0) 70%);
            top: -200px;
            left: -200px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: float 10s infinite alternate;
        }
        .bg-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(79,172,254,0.08) 0%, rgba(5,5,8,0) 70%);
            bottom: -100px;
            right: -100px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: float 12s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Header */
        header {
            position: fixed;
            top: 0; width: 100%; z-index: 100;
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 8, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
            transition: all 0.3s;
        }
        header.scrolled { padding: 15px 5%; background: rgba(5, 5, 8, 0.9); }
        
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
        .logo span { background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        nav { display: flex; gap: 40px; }
        nav a { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        nav a:hover { color: var(--accent-1); }

        /* Marquee */
        .marquee-wrapper {
            position: relative;
            background: rgba(255,255,255,0.02);
            padding: 15px 0;
            overflow: hidden;
            display: flex;
            white-space: nowrap;
            border-top: 1px solid var(--card-border);
            border-bottom: 1px solid var(--card-border);
            z-index: 10;
        }
        .marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
        }
        .marquee span { margin-right: 50px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Hero */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }
        .hero::before {
            content: '';
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center/cover;
            opacity: 0.15;
            z-index: -1;
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }
        .hero-label {
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid var(--accent-1);
            border-radius: 30px;
            color: var(--accent-1);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeUp 1s ease 0.2s forwards;
        }
        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeUp 1s ease 0.4s forwards;
        }
        .hero h1 span {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 1s ease 0.6s forwards;
        }

        /* Buttons */
        .btn-wrap {
            display: flex; gap: 20px;
            opacity: 0;
            animation: fadeUp 1s ease 0.8s forwards;
        }
        .btn {
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            color: #000;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.5);
        }
        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sections */
        section { padding: 120px 10%; position: relative; }
        .section-header { text-align: center; margin-bottom: 80px; }
        .section-tag { color: var(--accent-1); font-size: 14px; font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; display: block;}
        .section-title { font-size: 3rem; font-weight: 900; margin-bottom: 20px; }
        .section-desc { font-size: 1.1rem; color: var(--text-muted); max-width: 700px; margin: 0 auto; }

        /* Services Grid */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .service-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        .service-card:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .service-card:hover::before { transform: scaleX(1); }
        .service-no { font-size: 12px; font-weight: 800; color: var(--accent-2); letter-spacing: 2px; margin-bottom: 20px; display: block; }
        .service-icon { font-size: 24px; color: var(--text-main); margin-bottom: 20px; opacity: 0.8; }
        .service-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 15px; }
        .service-text { color: var(--text-muted); line-height: 1.6; font-size: 0.95rem; }

        /* Creators Grid (Masonry style) */
        .creator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .creator-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 3/4;
            cursor: pointer;
            background: #111;
        }
        .creator-img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .creator-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px 20px;
            opacity: 1;
        }
        .creator-card:hover .creator-img { transform: scale(1.05); }
        
        .creator-name { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .creator-tags { font-size: 0.9rem; color: var(--accent-1); }

        /* Contact Section */
        .contact { background: rgba(255,255,255,0.02); text-align: center; border-top: 1px solid var(--card-border); }
        .contact-form-wrap { max-width: 600px; margin: 0 auto; margin-top: 40px; text-align: left; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-row .contact-input { flex: 1; }
        .contact-input { width: 100%; padding: 15px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 12px; color: #fff; font-family: 'Pretendard', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .contact-input.full-width { margin-bottom: 15px; }
        .contact-input:focus { border-color: var(--accent-1); }
        .contact-input::placeholder { color: rgba(255,255,255,0.3); }
        .textarea { height: 150px; resize: none; margin-bottom: 20px; }
        .form-submit-btn { width: 100%; border: none; cursor: pointer; justify-content: center; font-size: 1.1rem; }
        @media (max-width: 768px) { .form-row { flex-direction: column; gap: 15px; } }
        
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .social-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: #fff;
            transition: all 0.3s;
        }
        .social-btn:hover { background: var(--accent-1); color: #000; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,242,254,0.3); }

        /* Footer */
        footer {
            padding: 40px 10%;
            text-align: center;
            border-top: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Scroll Animations Class */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 999;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
            overflow-y: auto; padding: 20px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            background: rgba(15,15,20,0.95);
            border: 1px solid var(--card-border);
            border-radius: 20px; width: 100%; max-width: 900px;
            padding: 40px; position: relative;
            transform: translateY(30px); transition: transform 0.3s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: auto;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-close {
            position: absolute; top: 20px; right: 25px;
            background: none; border: none; color: #fff; font-size: 24px;
            cursor: pointer; transition: color 0.3s;
        }
        .modal-close:hover { color: var(--accent-1); }
        
        .modal-header { display: flex; gap: 30px; margin-bottom: 40px; align-items: flex-start; }
        .modal-profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 2px solid var(--card-border); }
        .modal-profile-icon { width: 150px; height: 150px; border-radius: 50%; background: var(--card-bg); border: 2px solid var(--card-border); display: flex; align-items: center; justify-content: center; font-size: 60px; }
        .modal-info { flex: 1; }
        .modal-info h2 { font-size: 2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .modal-badge { font-size: 0.8rem; background: var(--accent-2); color: #000; padding: 3px 8px; border-radius: 4px; font-weight: bold; vertical-align: middle; }
        .modal-tags { color: var(--accent-1); margin-bottom: 15px; font-size: 0.95rem; }
        .modal-bio { color: var(--text-muted); font-size: 0.95rem; line-height: 1.8; margin-bottom: 20px; white-space: pre-wrap; }
        .modal-sns { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal-sns a { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; color: #fff; transition: all 0.3s; display: inline-flex; align-items: center; gap: 5px; }
        .modal-sns a:hover { background: var(--accent-1); color: #000; border-color: var(--accent-1); }
        
        .modal-works-title { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid var(--card-border); padding-bottom: 10px; font-weight: 700; letter-spacing: 1px; }
        .modal-works-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .modal-work-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); display: flex; justify-content: center; align-items: center; color: var(--text-muted); font-size: 2rem; }
        .modal-work-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; cursor: pointer; }
        .modal-work-item img:hover { transform: scale(1.05); }
        @media (max-width: 768px) {
            .modal-header { flex-direction: column; align-items: center; text-align: center; }
            .modal-works-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-sns { justify-content: center; }
            .modal-content { padding: 30px 20px; }
        }

        /* Fullscreen Image Viewer */
        .image-viewer-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
            padding: 20px;
        }
        .image-viewer-overlay.active { display: flex; opacity: 1; }
        .image-viewer-img { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(0.9); transition: transform 0.3s ease; }
        .image-viewer-overlay.active .image-viewer-img { transform: scale(1); }
        .image-viewer-close { position: absolute; top: 20px; right: 25px; background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; transition: color 0.3s; }
        .image-viewer-close:hover { color: var(--accent-1); }

        /* Prevent Image Theft */
        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            section { padding: 80px 5%; }
            nav { display: none; } /* Add hamburger menu logic later if needed */
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <header id="header">
        <div class="logo">STAND<span>UP</span></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="artists.html">Creators</a>
        </nav>
    </header>



    <section id="creators" style="padding-top: 150px; min-height: 100vh;">
        <div class="section-header reveal">
            <span class="section-tag">CREATORS</span>
            <h2 class="section-title">함께하는 작가님들</h2>
            <p class="section-desc">STAND UP과 함께 서브컬처 트렌드를 이끌어가는 크리에이터 라인업</p>
        </div>
        <div class="creator-grid" id="creatorGrid">
            <!-- Creators will be loaded dynamically via JS -->
            <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 50px 0;">작가 데이터를 불러오는 중...</div>
        </div>

    <footer>

    </footer>

    <!-- Artist Modal -->
    <div class="modal-overlay" id="artistModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="modal-header">

                    <div class="modal-tags" id="modalTags">#태그1 #태그2</div>

                        <!-- SNS links injected here -->
                    </div>
                </div>
            </div>

            <div class="modal-works">
                <div class="modal-works-title">PORTFOLIO</div>
                <div class="modal-works-grid" id="modalWorksGrid">
                    <!-- Works injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div class="image-viewer-overlay" id="imageViewer" onclick="closeImageViewer(event)">
        <button class="image-viewer-close" onclick="closeImageViewer()"><i class="fa-solid fa-xmark"></i></button>
        <img src="" id="imageViewerImg" class="image-viewer-img" onclick="event.stopPropagation()">
    </div>

    <script>
        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Intersection Observer for scroll animations
        const revealElements = document.querySelectorAll('.reveal');
        
        const revealOptions = {
            threshold: 0.1,
            rootMargin: "0px 0px -50px 0px"
        };

        const revealOnScroll = new IntersectionObserver(function(entries, observer) {
            entries.forEach(entry => {
                if (!entry.isIntersecting) {
                    return;
                } else {
                    entry.target.classList.add('active');
                    observer.unobserve(entry.target);
                }
            });
        }, revealOptions);

        revealElements.forEach(el => {
            revealOnScroll.observe(el);
        });
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
        
        // --- Firebase Configuration ---
        // admin.html과 동일한 키를 여기에 붙여넣어주세요.
        const firebaseConfig = {
            apiKey: "AIzaSyDd85t65S0F5sZSsiYCwQMSnmw0Jt3HlEg",
            authDomain: "standupp-7cfeb.firebaseapp.com",
            projectId: "standupp-7cfeb",
            storageBucket: "standupp-7cfeb.firebasestorage.app",
            messagingSenderId: "390358747706",
            appId: "1:390358747706:web:aaec773c9d95397ea78303"
        };
        const isFirebaseReady = firebaseConfig.apiKey !== "YOUR_API_KEY";
        let db = null;
        let artistsRef = null;
        if(isFirebaseReady) {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            artistsRef = doc(db, 'standup_sites', 'standupp3_artists_v2');
        }

        let loadedArtists = [];
        async function loadAndRenderCreators() {
            let artists = [];
            const grid = document.getElementById('creatorGrid');

            // 1. Firebase에서 불러오기 시도
            if (isFirebaseReady && artistsRef) {
                try {
                    const snap = await getDoc(artistsRef);
                    if (snap.exists() && Array.isArray(snap.data().items)) {
                        artists = snap.data().items;
                    }
                } catch(e) { console.error("Firebase load err", e); }
            }
            
            // 2. 실패시 또는 미설정시 artists-data.json 에서 불러오기
            if(artists.length === 0) {
                try {
                    const res = await fetch('artists-data.json', { cache: 'no-store' });
                    if(res.ok) {
                        const parsed = await res.json();
                        if(Array.isArray(parsed)) artists = parsed;
                    }
                } catch(e) { console.log('No local data fallback available yet.'); }
            }

            // 렌더링 로직
            if(artists.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 50px 0;">현재 새로운 작가 라인업을 준비 중입니다.</div>';
                return;
            }

            grid.innerHTML = artists.map((a, idx) => {
                // 이미지가 없으면 임시 썸네일 사용
                const imgSrc = a.characterImg || 'https://images.unsplash.com/photo-1544502062-f82887f03d1c?auto=format&fit=crop&q=80&w=600';
                const tagString = (a.tags || []).map(t => `#${t}`).join(' ');
                
                return `
                <div class="creator-card reveal" style="transition-delay: ${(idx % 4) * 0.1}s;" onclick="openModal(${idx})">
                    <img src="${imgSrc}" alt="${a.name}" class="creator-img">
                    <div class="creator-overlay">
                        <h3 class="creator-name">${a.icon || ''} ${a.name}</h3>
                        <p class="creator-tags">${tagString}</p>
                    </div>
                </div>`;
            }).join('');

            // 새로 추가된 카드가 나타나도록 기존의 IntersectionObserver에 등록
            const newCards = grid.querySelectorAll('.reveal');
            newCards.forEach(el => {
                if (window.revealOnScroll) {
                    window.revealOnScroll.observe(el);
                } else {
                    // revealOnScroll 전역 변수 없으면 그냥 띄움
                    el.classList.add('active');
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }
            });
            loadedArtists = artists;
        }

        window.openModal = function(idx) {
            const a = loadedArtists[idx];
            if(!a) return;
            
            document.getElementById('modalName').innerText = a.name || '작가명';
            document.getElementById('modalBadge').innerText = a.badge || '작가';
            document.getElementById('modalIcon').innerText = a.icon || '🎨';
            
            const tagHtml = (a.tags || []).map(t => `#${t}`).join(' ');
            document.getElementById('modalTags').innerText = tagHtml;
            document.getElementById('modalBio').innerText = a.bio || '';
            
            // Profile image
            const pWrap = document.getElementById('modalProfileWrapper');
            if(a.characterImg) {
                pWrap.innerHTML = `<img src="${a.characterImg}" class="modal-profile-img">`;
            } else {
                pWrap.innerHTML = `<div class="modal-profile-icon">${a.icon || '🎨'}</div>`;
            }
            
            // SNS Links
            const snsWrap = document.getElementById('modalSns');
            if(Array.isArray(a.sns) && a.sns.length > 0) {
                snsWrap.innerHTML = a.sns.filter(s => s && s.url).map(s => `<a href="${s.url}" target="_blank"><i class="fa-solid fa-link"></i> ${s.label}</a>`).join('');
            } else {
                snsWrap.innerHTML = '';
            }
            
            // Works
            const worksWrap = document.getElementById('modalWorksGrid');
            const works = Array.isArray(a.works) ? a.works : [];
            let worksHtml = '';
            for(let i=0; i<6; i++) {
                if(works[i]) {
                    worksHtml += `<div class="modal-work-item"><img src="${works[i]}" onclick="openImageViewer('${works[i]}')"></div>`;
                } else {
                    worksHtml += `<div class="modal-work-item">🖼</div>`;
                }
            }
            worksWrap.innerHTML = worksHtml;
            
            document.getElementById('artistModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = function(e) {
            if(e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close') && !e.target.closest('.modal-close')) return;
            document.getElementById('artistModal').classList.remove('active');
            document.body.style.overflow = '';
        };

        window.openImageViewer = function(src) {
            document.getElementById('imageViewerImg').src = src;
            document.getElementById('imageViewer').classList.add('active');
        };

        window.closeImageViewer = function(e) {
            if(e && e.target !== e.currentTarget && !e.target.classList.contains('image-viewer-close') && !e.target.closest('.image-viewer-close')) return;
            document.getElementById('imageViewer').classList.remove('active');
        };

        // Close on Escape key
        document.addEventListener('keydown', e => {
            if(e.key === 'Escape') {
                if(document.getElementById('imageViewer').classList.contains('active')) {
                    window.closeImageViewer();
                } else {
                    window.closeModal();
                }
            }
        });

        // Prevent image right-click
        document.addEventListener('contextmenu', e => {
            if(e.target.tagName === 'IMG') e.preventDefault();
        });

        loadAndRenderCreators();

        window.handleContactSubmit = async function(e) {

            const EMAILJS_PUBLIC_KEY = 'OfzE9v6hiHgQScofZ';
            const CONTACT_RECEIVER_EMAIL = 'moocrew25@gmail.com';
            
            const name = document.getElementById('contactName').value.trim();

            const btn = document.getElementById('contactSubmitBtn');

                    method: 'POST',

                    body: JSON.stringify({
                        service_id: EMAILJS_SERVICE_ID,
                        template_id: EMAILJS_TEMPLATE_ID,
                        user_id: EMAILJS_PUBLIC_KEY,
                        template_params: {
                            to_email: CONTACT_RECEIVER_EMAIL,
                            from_name: name,
                            from_email: email,
                            platform: platform || '-',
                            message: message,
                            reply_to: email,
                        },
                    }),
                });
                
                if(!response.ok) throw new Error('Network error');
                alert('문의가 성공적으로 전송되었습니다. 확인 후 답변 드리겠습니다.');

            } catch(error) {

                alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '문의 보내기 <i class="fa-solid fa-paper-plane"></i>';
            }
        };

    </script>
