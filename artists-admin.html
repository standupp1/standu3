<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artists Admin | STAND UP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080c1a; --card: #111d3a; --card2: #0f1a32;
  --blue: #4a80e8; --blue-bright: #7aaeff;
  --white: #eef2ff; --dim: rgba(238,242,255,0.7);
  --border: rgba(74,128,232,0.25);
  --sans: 'Gowun Dodum', sans-serif; --serif: 'Noto Serif KR', serif;
}
body { background: var(--bg); color: var(--white); font-family: var(--sans); padding: 28px; }
.wrap { max-width: 1100px; margin: 0 auto; }
h1 { font-family: var(--serif); margin-bottom: 10px; }
.sub { color: var(--dim); margin-bottom: 24px; }
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
button {
  border: 1px solid var(--border); background: transparent; color: var(--blue-bright);
  border-radius: 999px; padding: 9px 14px; cursor: pointer; font-family: var(--sans); font-weight: 700;
}
button:hover { background: rgba(122,174,255,0.08); }
.btn-danger { color: #ffb6b6; border-color: rgba(255,120,120,0.45); }
.layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; }
.artist-list { display: flex; flex-direction: column; gap: 8px; max-height: 70vh; overflow-y: auto; }
.artist-item {
  border: 1px solid var(--border); border-radius: 12px; padding: 10px;
  background: var(--card2); cursor: pointer;
}
.artist-item.active { border-color: var(--blue-bright); box-shadow: 0 0 0 1px rgba(122,174,255,0.4); }
.artist-item-name { font-weight: 700; margin-bottom: 4px; }
.artist-item-meta { font-size: 12px; color: var(--dim); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.full { grid-column: 1 / -1; }
label { font-size: 12px; color: var(--dim); margin-bottom: 4px; display: block; }
input, textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 12px; background: #0b1428;
  color: var(--white); padding: 10px 12px; font-family: var(--sans);
}
textarea { min-height: 100px; resize: vertical; }
.hint { margin-top: 10px; font-size: 12px; color: var(--dim); }
.works-editor { margin-top: 14px; }
.works-title { font-size: 13px; color: var(--blue-bright); margin-bottom: 8px; }
.works-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.work-box { border: 1px solid var(--border); border-radius: 12px; padding: 10px; background: #0b1428; }
.work-box label { font-size: 11px; }
.work-preview {
  width: 100%; aspect-ratio: 1; border: 1px solid var(--border); border-radius: 10px;
  margin-top: 8px; object-fit: cover; background: #111a30;
}
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>작가 관리 페이지</h1>
  <p class="sub">Firebase 연결 시 저장 즉시 공개 페이지에 반영됩니다. 미연결 상태에서는 JSON 다운로드 방식으로 사용하세요.</p>

  <div class="toolbar">
    <button onclick="addArtist()">새 작가 추가</button>
    <button onclick="saveArtist()">현재 항목 반영</button>
    <button onclick="downloadJson()">artists-data.json 다운로드</button>
    <button onclick="document.getElementById('jsonUpload').click()">JSON 불러오기</button>
    <input id="jsonUpload" type="file" accept=".json,application/json" style="display:none" onchange="importJson(event)">
    <button class="btn-danger" onclick="deleteArtist()">선택 삭제</button>
    <button onclick="location.href='artists.html'">공개 페이지 보기</button>
  </div>

  <div class="layout">
    <div class="panel">
      <div id="artistList" class="artist-list"></div>
    </div>
    <div class="panel">
      <div class="form-grid">
        <div>
          <label>작가명</label>
          <input id="name" type="text">
        </div>
        <div>
          <label>분류 배지 (예: 일러스트)</label>
          <input id="badge" type="text">
        </div>
        <div>
          <label>아이콘 (이모지 1개)</label>
          <input id="icon" type="text">
        </div>
        <div>
          <label>카드 짧은 소개</label>
          <input id="cardDesc" type="text">
        </div>
        <div class="full">
          <label>태그 (쉼표로 구분)</label>
          <input id="tags" type="text" placeholder="캐릭터, 팬아트">
        </div>
        <div class="full">
          <label>상세 소개 (줄바꿈 가능)</label>
          <textarea id="bio"></textarea>
        </div>
      </div>
      <div class="works-editor">
        <div class="works-title">대표 작품 이미지 (최대 6개)</div>
        <div id="worksEditor" class="works-grid"></div>
      </div>
      <p class="hint">보안 참고: 이 페이지는 프론트 전용이라 강한 보안은 아닙니다. 실제 운영 시 서버 권한 인증을 권장합니다.</p>
    </div>
  </div>
</div>

<script type="module">
import { firebaseApp, firebaseReady, artistsDocPath } from './firebase-config.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

const DATA_FILE = 'artists-data.json';
const ADMIN_PASSWORD = 'standup-admin-2026';
const DEFAULT_ARTISTS = [
  { name: '작가명', badge: '일러스트', icon: '🎨', cardDesc: '따뜻한 색감과 섬세한 선으로 캐릭터를 표현합니다.', tags: ['캐릭터', '팬아트', '일러스트'], bio: '따뜻한 색감과 섬세한 선으로 캐릭터를 표현하는 일러스트 작가입니다.\n\nSNS를 중심으로 활발히 활동하며, 굿즈 제작 경험도 다수 보유하고 있습니다.', sns: [{ label: '𝕏 Twitter', url: '#' }], characterImg: null, works: [null, null, null, null, null, null], workIcons: ['🌟','✨','💖','🎀','🌙','🎵'] },
  { name: '작가명', badge: '만화', icon: '✏️', cardDesc: '감성적인 스토리와 개성 있는 그림체가 특징입니다.', tags: ['오리지널', 'BL', '만화'], bio: '감성적인 스토리와 개성 있는 그림체가 특징인 만화 작가입니다.\n\n오리지널 BL 작품을 중심으로 활동하며 팬층을 꾸준히 넓혀가고 있습니다.', sns: [{ label: '𝕏 Twitter', url: '#' }], characterImg: null, works: [null, null, null, null, null, null], workIcons: ['📖','✏️','💜','🖊','📝','🌸'] },
  { name: '작가명', badge: '굿즈', icon: '🖌️', cardDesc: '판타지 세계관의 소녀들을 화사하게 그려냅니다.', tags: ['소녀', '판타지', '굿즈'], bio: '판타지 세계관의 소녀들을 화사하게 그려내는 작가입니다.\n\n아크릴 키링, 포스터 등 다양한 굿즈 제작 경험을 보유하고 있습니다.', sns: [{ label: '𝕏 Twitter', url: '#' }], characterImg: null, works: [null, null, null, null, null, null], workIcons: ['🌺','🦋','💎','🌙','⭐','🌈'] },
];

let artists = [];
let selectedIndex = -1;
let db = null;
let artistsRef = null;

function requirePassword() {
  const input = window.prompt('관리자 비밀번호를 입력하세요.');
  if (input !== ADMIN_PASSWORD) {
    window.alert('접근 권한이 없습니다.');
    location.href = 'artists.html';
  }
}

function loadArtists() {
  if (firebaseReady && firebaseApp) {
    db = getFirestore(firebaseApp);
    artistsRef = doc(db, artistsDocPath.collection, artistsDocPath.document);

    return getDoc(artistsRef)
      .then((snap) => {
        if (snap.exists()) {
          const data = snap.data();
          artists = Array.isArray(data.items) ? data.items : [...DEFAULT_ARTISTS];
          return;
        }
        artists = [...DEFAULT_ARTISTS];
      })
      .catch(() => {
        artists = [...DEFAULT_ARTISTS];
      });
  }

  return fetch(DATA_FILE, { cache: 'no-store' })
    .then((res) => {
      if (!res.ok) throw new Error('load failed');
      return res.json();
    })
    .then((parsed) => {
      artists = Array.isArray(parsed) && parsed.length ? parsed : [...DEFAULT_ARTISTS];
    })
    .catch(() => {
      artists = [...DEFAULT_ARTISTS];
    });
}

function persistArtists() {
  if (!firebaseReady || !artistsRef) return Promise.resolve(false);
  return setDoc(artistsRef, { items: artists }, { merge: true })
    .then(() => true)
    .catch(() => false);
}

function renderList() {
  const list = document.getElementById('artistList');
  list.innerHTML = artists.map((a, idx) => `
    <div class="artist-item ${idx === selectedIndex ? 'active' : ''}" onclick="selectArtist(${idx})">
      <div class="artist-item-name">${a.icon || '🎨'} ${a.name || '작가명'}</div>
      <div class="artist-item-meta">${a.badge || '작가'} · ${(a.tags || []).slice(0, 2).join(', ')}</div>
    </div>
  `).join('');
}

function selectArtist(idx) {
  selectedIndex = idx;
  const a = artists[idx];
  if (!a) return;

  document.getElementById('name').value = a.name || '';
  document.getElementById('badge').value = a.badge || '';
  document.getElementById('icon').value = a.icon || '';
  document.getElementById('cardDesc').value = a.cardDesc || '';
  document.getElementById('tags').value = (a.tags || []).join(', ');
  document.getElementById('bio').value = a.bio || '';
  renderWorksEditor(a);
  renderList();
}

function renderWorksEditor(artist) {
  const editor = document.getElementById('worksEditor');
  const works = Array.isArray(artist.works) ? [...artist.works] : [null, null, null, null, null, null];
  while (works.length < 6) works.push(null);

  editor.innerHTML = works.map((url, i) => {
    const safeUrl = url || '';
    return `
      <div class="work-box">
        <label>작품 ${i + 1} 이미지 URL</label>
        <input id="workUrl${i}" type="text" value="${safeUrl}" placeholder="https://... 또는 비워두기">
        <label style="margin-top:8px;">파일 업로드</label>
        <input id="workFile${i}" type="file" accept="image/*" onchange="handleWorkFileChange(${i}, event)">
        <img id="workPreview${i}" class="work-preview" src="${safeUrl || ''}" alt="작품 ${i + 1} 미리보기" style="${safeUrl ? '' : 'display:none;'}">
      </div>
    `;
  }).join('');
}

function handleWorkFileChange(idx, event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target && e.target.result ? String(e.target.result) : '';
    if (!dataUrl) return;

    const urlInput = document.getElementById(`workUrl${idx}`);
    const preview = document.getElementById(`workPreview${idx}`);
    if (urlInput) urlInput.value = dataUrl;
    if (preview) {
      preview.src = dataUrl;
      preview.style.display = '';
    }
  };
  reader.readAsDataURL(file);
}

function addArtist() {
  const base = {
    name: '새 작가',
    badge: '일러스트',
    icon: '🎨',
    cardDesc: '작가 소개를 입력해주세요.',
    tags: ['신규'],
    bio: '작가 상세 소개를 입력해주세요.',
    sns: [{ label: '𝕏 Twitter', url: '#' }],
    characterImg: null,
    works: [null, null, null, null, null, null],
    workIcons: ['🖼','✨','🌟','🎨','💫','🌙'],
  };
  artists.push(base);
  selectArtist(artists.length - 1);
}

async function saveArtist() {
  if (selectedIndex < 0 || !artists[selectedIndex]) {
    window.alert('저장할 작가를 먼저 선택하세요.');
    return;
  }
  const target = artists[selectedIndex];
  target.name = document.getElementById('name').value.trim() || '작가명';
  target.badge = document.getElementById('badge').value.trim() || '작가';
  target.icon = document.getElementById('icon').value.trim() || '🎨';
  target.cardDesc = document.getElementById('cardDesc').value.trim() || '작가 소개 문구입니다.';
  target.tags = document.getElementById('tags').value.split(',').map(v => v.trim()).filter(Boolean);
  target.bio = document.getElementById('bio').value.trim() || '작가 상세 소개를 입력해주세요.';
  if (!Array.isArray(target.sns) || !target.sns.length) target.sns = [{ label: '𝕏 Twitter', url: '#' }];
  target.works = Array.from({ length: 6 }, (_, i) => {
    const input = document.getElementById(`workUrl${i}`);
    const value = input ? input.value.trim() : '';
    return value || null;
  });
  if (!Array.isArray(target.workIcons) || target.workIcons.length !== 6) target.workIcons = ['🖼','✨','🌟','🎨','💫','🌙'];

  const saved = await persistArtists();
  renderList();
  if (saved) {
    window.alert('저장 완료: Firebase에 즉시 반영되었습니다.');
    return;
  }
  window.alert('Firebase 미연결 상태입니다. 필요 시 JSON 다운로드로 반영하세요.');
}

async function deleteArtist() {
  if (selectedIndex < 0 || !artists[selectedIndex]) {
    window.alert('삭제할 작가를 먼저 선택하세요.');
    return;
  }
  if (!window.confirm('선택한 작가를 삭제할까요?')) return;
  artists.splice(selectedIndex, 1);
  if (!artists.length) {
    selectedIndex = -1;
    document.getElementById('name').value = '';
    document.getElementById('badge').value = '';
    document.getElementById('icon').value = '';
    document.getElementById('cardDesc').value = '';
    document.getElementById('tags').value = '';
    document.getElementById('bio').value = '';
  } else {
    selectArtist(Math.max(0, selectedIndex - 1));
  }
  const saved = await persistArtists();
  renderList();
  if (!saved) {
    window.alert('Firebase 미연결 상태입니다. 필요 시 JSON 다운로드로 반영하세요.');
  }
}

function downloadJson() {
  const json = JSON.stringify(artists, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'artists-data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importJson(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = String(e.target && e.target.result ? e.target.result : '[]');
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) throw new Error('invalid');
      artists = parsed;
      selectedIndex = -1;
      renderList();
      if (artists.length) selectArtist(0);
      window.alert('JSON 불러오기를 완료했습니다.');
    } catch (err) {
      window.alert('JSON 형식이 올바르지 않습니다.');
    }
  };
  reader.readAsText(file, 'utf-8');
}

requirePassword();
loadArtists().then(() => {
  renderList();
  if (artists.length) selectArtist(0);
});
</script>
</body>
</html>
